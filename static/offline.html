<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — Third-Life</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container { text-align: center; max-width: 400px; }
    h1 { font-size: 1.5rem; margin: 1rem 0; color: #ab0000; }
    p { color: #888; line-height: 1.6; }
    .icon { font-size: 4rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>The app needs a network connection to load for the first time.</p>
    <p style="margin-top: 0.5rem; font-size: 0.875rem;">
      Once loaded, Third-Life works fully offline.
    </p>
  </div>
</body>
</html>
